services:
  api:
    image: nexus-api-dev:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexus_api_dev
    working_dir: /app
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    networks:
      - nexus_devnet

volumes:
  api_node_modules:

networks:
  nexus_devnet:
    external: true
    name: nexus_devnet